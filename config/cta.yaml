# Calls to action — the funnel layer.
# /atomize stamps each text derivative's `cta` (url) + `cta_label` from the pillar target below;
# /publish (typefully) then PLACES that link per `placement` for the platform — so the post body
# stays clean (Muxin's words only) and the link never triggers an algorithm penalty.
#
# Brand-building funnel (no product to sell yet): a "read more" CTA sends people to the
# SOURCE essay itself (where the Substack subscribe prompt also lives) — converting rented
# platform attention into OWNED audience. When there's no specific essay to point at, it falls
# back to the Substack home. Civic-tech posts point at the voting tool. Donations stay
# secondary — never the headline ask.

targets:                 # default CTA per pillar — /atomize fills `cta` + `cta_label` from here
  human-ai:
    url: source          # → the source essay's own url (source.md `canonical_url`); else source_fallback
    label: "Full essay (free to subscribe):"
  claude-code:
    url: source
    label: "Full essay (free to subscribe):"
  civic-tech:
    url: "https://voter-choice.vercel.app/"
    label: "See where your reps actually stand:"
  career-work:
    url: "https://humaninference.substack.com"
    label: "Full essay (free to subscribe):"
  builder:
    url: "https://humaninference.substack.com"
    label: "Full essay (free to subscribe):"
  other:
    url: source
    label: "Read the full piece (free to subscribe):"

# Fallback when `url: source` can't resolve — the piece has no published essay URL yet
# (voice memo, raw thought, or `canonical_url` not pasted into source.md). /publish swaps in
# this url + label so the funnel still converts to an owned subscriber instead of breaking.
source_fallback:
  url: "https://humaninference.substack.com"
  label: "More from me (free to subscribe):"

placement:               # WHERE the link goes per platform (from Branding/.../Platform Reference.md)
  x: reply               # links in-post = 30-50% reach penalty → link goes in the first reply
  linkedin: inline       # link in the post body. The cleaner first-comment needs gated LinkedIn API
                         # access (Community Management); inline keeps LinkedIn on Typefully like the
                         # rest, fully automated. Accepts the in-feed link penalty (modest at this scale).
  bluesky: inline        # links are fine inline here
  community: inline      # action-oriented rooms — link inline

# Notes:
# - `cta: source` is resolved at /publish from the content folder's source.md `canonical_url`.
#   Atomizing a live Substack URL auto-fills it; for a local draft, paste the published URL into
#   source.md before /publish so "read more" CTAs land on the essay (else they fall back to home).
# - quote-card derivatives now take the pillar CTA too (default `source`); publish:cards places it
#   like text — INLINE on inline platforms (Bluesky/LinkedIn), OMITTED where placement is `reply`
#   (X), because the image relays can't post a reply/first-comment so omitting dodges X's penalty.
#   video-script still carries its CTA inside the asset.
# - A derivative can override the pillar default by setting its own `cta:` in frontmatter — a
#   literal url (e.g. a civic-leaning Bluesky post on a human-ai essay → the voting tool), or
#   `none` for no link.
# - Note-derived content (source_kind: substack-note) links to the ORIGINAL note by default: an
#   empty `cta` on a note resolves to the note's own canonical_url (a Note is itself the
#   destination). Enforced in src/publish/cta.ts, scoped to notes — essays are unaffected. An
#   explicit `cta: none` or a literal url on a note derivative still wins.
