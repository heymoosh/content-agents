# Per-platform format rules. validate.ts enforces hard limits; Claude follows style notes when drafting.
#
# Scheduling (Muxin, 2026-06-16): anchor posting times to PST, NOT his local CST, because the
# tech/AI audience skews West Coast (SF Bay is a top location). `best_times_pst` is the human-readable
# target window; the machine-readable cadence below it drives automatic scheduling.
#
# CADENCE (Muxin, 2026-06-16): publish:typefully now computes an EXPLICIT publish time per post and
# sends it to Typefully (DST-aware, PT) so posts auto-publish on schedule — no manual dragging. Three
# fields per platform drive it:
#   posts_per_week  — cap on how many posts land on this platform in any Mon-Sun week
#   slot_days       — weekdays eligible for a slot (Sun..Sat); scheduler places ~1/day, never same-day
#   slot_time_pst   — time of day (PST/PDT wall clock) for that day's slot, inside best_times_pst
# Approved posts fill the next free future slots in queue order, spreading across weeks if there are
# more than posts_per_week. Cross-run + cross-stream spacing IS built: src/publish/slots.ts records
# every claim in a shared ledger (data/publish-schedule.jsonl), so text and cards never double-book a
# platform's day across separate runs. A platform without these three fields falls back to
# Typefully "next-free-slot".
platforms:
  x:
    max_chars: 280
    derivative_count: [3, 5]
    best_times_pst: "Tue-Thu, 9-11am (primary), 1-2pm (secondary). Weaker on weekends, but posting keeps presence."
    posts_per_week: 5
    slot_days: [Mon, Tue, Wed, Thu, Fri, Sat, Sun]   # weekends allowed; weekly cap still limits volume
    slot_time_pst: "09:30"
    style: >
      Short claims or provocations. Pick the sharpest sentence from the source and
      trim for 280-char energy. No hashtag spam; 0-1 hashtags max.
  linkedin:
    max_chars: 3000
    derivative_count: [1, 2]
    best_times_pst: "Tue-Thu, 8-10am. Business hours only; no evenings or weekends."
    posts_per_week: 2
    slot_days: [Tue, Thu]
    slot_time_pst: "08:30"
    style: >
      Lesson post, left-aligned narrative, practitioner voice. Insight-driven,
      not link-dump. Short paragraphs, line breaks between thoughts.
  bluesky:
    max_chars: 300
    derivative_count: [2, 4]
    best_times_pst: "Daily 9-11am and 6-9pm. Evenings are lively for the AI/tech crowd, weekends included."
    posts_per_week: 7
    slot_days: [Mon, Tue, Wed, Thu, Fri, Sat, Sun]   # tech/AI crowd is active on weekends → true daily
    slot_time_pst: "18:30"
    style: >
      Like X but slightly more casual and observational. Civic/tech audience,
      less algorithmic pressure.
  community:
    max_chars: 1500
    derivative_count: [1, 1]
    style: >
      Conversational, specific to the community (see communities below). Shorter than
      LinkedIn. Reads like a member sharing, never like marketing.
  video-script:
    max_words: 220        # ~60-90s at normal speaking pace
    style: >
      Hook in first line, 1-2 main points, call to action. Direct, thoughtful,
      not hype-y. Written to be spoken aloud.
  quote-card:
    max_chars: 180
    # Card cadence for the unified scheduler (publish:cards). A card fans out to several platforms
    # at once, so it gets its own midday weekday window; it also de-conflicts against (and counts
    # toward) each target platform's cap, so a card series never pushes e.g. LinkedIn past its 2/wk.
    posts_per_week: 7
    slot_days: [Mon, Tue, Wed, Thu, Fri]
    slot_time_pst: "12:00"
    style: One or two quotable lines pulled verbatim from the source.
  tiktok:
    # TikTok video cadence for the unified scheduler (publish:tiktok), so the short shares the one
    # ledger as text + cards and never lands a PT day another TikTok post already took. Usually 1
    # short/piece, so the weekly cap is mostly headroom. TIKTOK_SCHEDULE_AT overrides for a one-off;
    # with no entry here it falls back to TIKTOK_SCHEDULE_LEAD_MIN.
    posts_per_week: 3
    slot_days: [Tue, Wed, Thu, Fri]
    slot_time_pst: "17:00"
  youtube:
    # YouTube Shorts cadence for the unified scheduler (publish:youtube). The short is uploaded as a
    # SCHEDULED publish (status.publishAt = the claimed slot, private until then) so it auto-goes
    # public on the same clock as text/cards/TikTok. The same render also feeds TikTok under a
    # separate platform key, so the two can share a calendar day. Remove these three fields to revert
    # to a plain private upload (manual flip in Studio).
    posts_per_week: 3
    slot_days: [Tue, Wed, Thu, Fri]
    slot_time_pst: "16:00"

communities:
  moral-ambition:
    notes: Broad community on moral ambition as a life philosophy. Civic and social good angle.
  democratic-resilience:
    notes: >
      Subgroup inside Moral Ambition focused on U.S. democracy, elections, civic action.
      Strongest traction for the voting tool. Be specific and action-oriented here.
  women-in-product:
    notes: Technical builder POV, AI-native product work. Professional credibility angle.
  abc-builders:
    notes: AI builder community. Presence not yet established — observe before posting heavily.
  lennys:
    notes: Product strategy, growth. Selective and occasional engagement only.
