# Image-gen bakeoff contenders — each row is one model+setting put head-to-head.
#
# provider  = adapter file in src/providers/image/<provider>.ts
# requires  = env var that must be set, else the contender is SKIPPED (with a note). null = none.
# cost_usd  = per-image estimate for the pre-run display only. The openrouter-image adapter
#             reports the REAL billed cost back (via usage.include), so the ranking uses that;
#             these numbers are just so the gallery isn't blank before a run. Edit freely.
# params    = passed to the adapter. For openrouter-image, params.model is the OpenRouter slug.
#
# Most contenders route through OpenRouter on the OPENROUTER_API_KEY the repo already uses.
# To add any model OpenRouter carries: copy a row, change label + params.model. To go cheaper /
# open-source, the cheap end (flux2-klein, riverflow, the free remotion-svg) is already here.
# Models OpenRouter doesn't cover get their own direct adapter (see gemini-imagen below).

aspect_default: "1:1"
image_size: "1K" # OpenRouter image_config size: 1K | 2K | 4K (per-contender params.image_size overrides)

contenders:
  # --- OpenRouter: Google "Nano Banana" family (token-based) ---
  - label: nano-banana
    provider: openrouter-image
    requires: OPENROUTER_API_KEY
    cost_usd: 0.04
    params: { model: google/gemini-2.5-flash-image }
  - label: nano-banana-2
    provider: openrouter-image
    requires: OPENROUTER_API_KEY
    cost_usd: 0.055
    params: { model: google/gemini-3.1-flash-image-preview }
  - label: nano-banana-pro
    provider: openrouter-image
    requires: OPENROUTER_API_KEY
    cost_usd: 0.16
    params: { model: google/gemini-3-pro-image-preview }

  # --- OpenRouter: ByteDance Seedream (flat per image) ---
  - label: seedream-4.5
    provider: openrouter-image
    requires: OPENROUTER_API_KEY
    cost_usd: 0.04
    params: { model: bytedance-seed/seedream-4.5, modalities: ["image"] }

  # --- OpenRouter: Black Forest Labs FLUX.2 (megapixel-based) ---
  - label: flux2-klein # cheapest high-quality option
    provider: openrouter-image
    requires: OPENROUTER_API_KEY
    cost_usd: 0.015
    params: { model: black-forest-labs/flux.2-klein-4b, modalities: ["image"] }
  - label: flux2-pro
    provider: openrouter-image
    requires: OPENROUTER_API_KEY
    cost_usd: 0.035
    params: { model: black-forest-labs/flux.2-pro, modalities: ["image"] }
  - label: flux2-max
    provider: openrouter-image
    requires: OPENROUTER_API_KEY
    cost_usd: 0.08
    params: { model: black-forest-labs/flux.2-max, modalities: ["image"] }

  # --- OpenRouter: Sourceful Riverflow (per-resolution) ---
  - label: riverflow-v2-fast
    provider: openrouter-image
    requires: OPENROUTER_API_KEY
    cost_usd: 0.02
    params: { model: sourceful/riverflow-v2-fast, modalities: ["image"] }

  # --- OpenRouter: OpenAI GPT image (token-based) ---
  - label: gpt5-image-mini
    provider: openrouter-image
    requires: OPENROUTER_API_KEY
    cost_usd: 0.05
    params: { model: openai/gpt-5-image-mini }
  - label: gpt5-image
    provider: openrouter-image
    requires: OPENROUTER_API_KEY
    cost_usd: 0.09
    params: { model: openai/gpt-5-image }
  - label: gpt5.4-image-2
    provider: openrouter-image
    requires: OPENROUTER_API_KEY
    cost_usd: 0.12
    params: { model: openai/gpt-5.4-image-2 }

  # --- OpenRouter: xAI Grok Imagine ---
  - label: grok-imagine
    provider: openrouter-image
    requires: OPENROUTER_API_KEY
    cost_usd: 0.05
    params: { model: x-ai/grok-imagine-image-quality, modalities: ["image"] }

  # --- Recraft V4.1 (great for editorial/vector illustration). Confirm the live slug on
  #     openrouter.ai/collections/image-models, then uncomment. ---
  # - label: recraft-v4
  #   provider: openrouter-image
  #   requires: OPENROUTER_API_KEY
  #   cost_usd: 0.04
  #   params: { model: recraft-ai/recraft-v4.1 }

  # --- Free + local: I author a flat New Yorker screen-print SVG, Remotion rasterizes it.
  #     Runs only when an SVG is supplied with --svg <file>; otherwise skipped. ---
  - label: remotion-svg
    provider: remotion-svg
    requires: null
    cost_usd: 0
    needs_svg: true
    params: { bg: "#f2ead9" }

  # --- Direct (not OpenRouter), on your GEMINI_API_KEY ---
  # Nano Banana Pro direct = the /atomize workhorse (chosen pick). Same model as the OpenRouter
  # `nano-banana-pro` contender but billed straight by Google, no ~5% markup. A/B them.
  - label: nano-banana-pro-direct
    provider: gemini-nano-banana
    requires: GEMINI_API_KEY
    cost_usd: 0.134
    params: { model: gemini-3-pro-image-preview }
  # Imagen 4 Fast — non-OpenRouter baseline (poor New-Yorker fit; kept for reference).
  - label: imagen4-fast
    provider: gemini-imagen
    requires: GEMINI_API_KEY
    cost_usd: 0.02
    params: { model: imagen-4.0-fast-generate-001 }
